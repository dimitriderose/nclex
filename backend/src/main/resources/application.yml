spring:
  application:
    name: nclex-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/nclex}
    username: ${DATABASE_USERNAME:nclex}
    password: ${DATABASE_PASSWORD:nclex}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

nclex:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-this-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  claude:
    api-key: ${CLAUDE_API_KEY:}
    api-url: ${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
    model: ${CLAUDE_MODEL:claude-sonnet-4-20250514}
    max-tokens: ${CLAUDE_MAX_TOKENS:4096}
  rate-limit:
    login:
      capacity: 5
      refill-minutes: 15
    register:
      capacity: 3
      refill-minutes: 60
    claude:
      capacity: 200
      refill-minutes: 60
  content-cache:
    refresh-cron: ${CACHE_REFRESH_CRON:0 0 3 * * ?}  # 3 AM daily
    retry-max-attempts: 3
    retry-initial-delay-ms: 200
  exam:
    min-questions: ${EXAM_MIN_QUESTIONS:75}
    max-questions: ${EXAM_MAX_QUESTIONS:145}
    time-limit-minutes: ${EXAM_TIME_LIMIT:300}
  readiness:
    snapshot-cron: ${READINESS_SNAPSHOT_CRON:0 0 4 * * ?}  # 4 AM daily

logging:
  level:
    root: INFO
    com.nclex: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
