version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nclex
      POSTGRES_USER: nclex
      POSTGRES_PASSWORD: nclex_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nclex"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Spring Boot) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/nclex
      SPRING_DATASOURCE_USERNAME: nclex
      SPRING_DATASOURCE_PASSWORD: nclex_dev_password
      JWT_SECRET: dev-jwt-secret-change-in-production-at-least-32-chars
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-sk-ant-placeholder}
      CLAUDE_MODEL_SONNET: ${CLAUDE_MODEL_SONNET:-claude-sonnet-4-20250514}
      CLAUDE_MODEL_HAIKU: ${CLAUDE_MODEL_HAIKU:-claude-haiku-4-5-20251001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ── Frontend (Nginx) ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    volumes:
      - ./docs/books/epubs:/usr/share/nginx/html/books/epubs:ro
      - ./docs/books/pdfs:/usr/share/nginx/html/books/pdfs:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
